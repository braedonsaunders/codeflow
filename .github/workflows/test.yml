name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Run test suite
        run: node --test tests/*.test.mjs
